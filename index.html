<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Favorite Card Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --cell-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #4CAF50;
            --danger-color: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        #grid-wrapper {
            background-color: var(--bg-color);
            padding: 20px;
            display: inline-block;
        }

        #grid-container {
            display: grid;
            gap: 8px;
        }

        .grid-header {
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .row-header {
            width: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-header span {
            display: block;
            transform: rotate(-90deg);
            white-space: nowrap;
            font-size: 12px;
            font-weight: bold;
            width: 0;
            text-transform: uppercase;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border: 1px dashed var(--border-color);
            aspect-ratio: 63 / 88;
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4.75%;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .grid-cell:hover { border-color: var(--accent-color); }

        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden { display: none !important; }

        .modal-content {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #search-input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            background: #111;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        #search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .result-card img {
            width: 100%;
            border-radius: 4.75%;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .result-card img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>MTG Grid Builder</h1>

    <div id="controls">
        <button id="btn-download">Download Image</button>
        <button id="btn-clear" style="background: var(--danger-color)">Reset Grid</button>
    </div>

    <div id="grid-wrapper">
        <div id="grid-container"></div>
    </div>

    <div id="search-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Search card name...">
                <button id="btn-search">Search</button>
            </div>
            <div id="search-results"></div>
            <button onclick="closeSearch()" style="margin-top:15px; width:100%; background:#444">Cancel</button>
        </div>
    </div>

    <script>
        const colors = ['White', 'Blue', 'Black', 'Red', 'Green'];
        const types = ['Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'];
        let selections = JSON.parse(localStorage.getItem('mtg_fav_grid')) || {};
        let currentTarget = null;

        function render() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `40px repeat(${colors.length}, 100px)`;

            // Empty Corner
            grid.appendChild(document.createElement('div'));

            // Column Headers (Colors)
            colors.forEach(c => {
                const div = document.createElement('div');
                div.className = 'grid-header';
                div.textContent = c;
                grid.appendChild(div);
            });

            // Rows (Types)
            types.forEach(t => {
                const rh = document.createElement('div');
                rh.className = 'row-header';
                rh.innerHTML = `<span>${t}</span>`;
                grid.appendChild(rh);

                colors.forEach(c => {
                    const key = `${c}-${t}`;
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.onclick = () => openSearch(key);
                    
                    if (selections[key]) {
                        const img = document.createElement('img');
                        // CRITICAL: Set crossOrigin BEFORE src for GitHub Pages/CORS compatibility
                        img.crossOrigin = "anonymous";
                        img.src = selections[key];
                        cell.appendChild(img);
                    } else {
                        cell.innerHTML = '<span style="color:#444; font-size: 24px;">+</span>';
                    }
                    grid.appendChild(cell);
                });
            });
        }

        function openSearch(key) {
            currentTarget = key;
            document.getElementById('search-modal').classList.remove('hidden');
            document.getElementById('search-input').focus();
        }

        function closeSearch() {
            document.getElementById('search-modal').classList.add('hidden');
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('search-input').value = '';
        }

        // Trigger search on button click
        document.getElementById('btn-search').onclick = performSearch;

        // Trigger search on 'Enter' key
        document.getElementById('search-input').onkeydown = (e) => {
            if (e.key === 'Enter') performSearch();
        };

        async function performSearch() {
            const q = document.getElementById('search-input').value;
            if (!q) return;

            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = 'Searching...';

            try {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                resultsContainer.innerHTML = '';
                
                if (data.data) {
                    data.data.forEach(card => {
                        const url = card.image_uris?.normal || card.card_faces?.[0].image_uris?.normal;
                        if (url) {
                            const div = document.createElement('div');
                            div.className = 'result-card';
                            const img = document.createElement('img');
                            img.src = url;
                            img.onclick = () => {
                                selections[currentTarget] = url;
                                localStorage.setItem('mtg_fav_grid', JSON.stringify(selections));
                                render();
                                closeSearch();
                            };
                            div.appendChild(img);
                            resultsContainer.appendChild(div);
                        }
                    });
                } else {
                    resultsContainer.innerHTML = 'No cards found.';
                }
            } catch (err) {
                resultsContainer.innerHTML = 'Error fetching cards.';
            }
        }

        document.getElementById('btn-download').onclick = () => {
            const el = document.getElementById('grid-wrapper');
            // html2canvas needs useCORS to be true for Scryfall images
            html2canvas(el, { 
                useCORS: true, 
                allowTaint: false,
                scale: 2,
                backgroundColor: "#121212"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-mtg-favorites.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        };

        document.getElementById('btn-clear').onclick = () => {
            if(confirm("Are you sure you want to clear the entire grid?")) {
                selections = {};
                localStorage.removeItem('mtg_fav_grid');
                render();
            }
        };

        render();
    </script>
</body>
</html>
