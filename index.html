<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Favorite Card Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --cell-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #4CAF50;
            --danger-color: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* Prevent any accidental peeking */
        }

        h1 { font-size: 1.2rem; margin: 10px 0; }

        #controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* The wrapper ensures html2canvas captures everything correctly */
        #grid-wrapper {
            background-color: var(--bg-color);
            padding: 10px;
            width: 98vw; /* Takes up almost full screen width */
            max-width: 900px; /* Limits size on desktop */
            box-sizing: border-box;
        }

        #grid-container {
            display: grid;
            /* 1st column is 30px, others split the remaining space equally */
            grid-template-columns: 30px repeat(7, 1fr); 
            gap: 3px;
        }

        .grid-header {
            font-weight: bold;
            text-align: center;
            font-size: 8px; /* Tiny text to fit headers */
            text-transform: uppercase;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-header {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
        }

        .row-header span {
            display: block;
            transform: rotate(-90deg);
            white-space: nowrap;
            font-size: 8px;
            font-weight: bold;
            text-transform: uppercase;
            color: #aaa;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border: 1px dashed var(--border-color);
            aspect-ratio: 63 / 88;
            width: 100%; /* Fills the 1fr space */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4%;
            overflow: hidden;
            cursor: pointer;
        }

        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-cell span { font-size: 16px; color: #333; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden { display: none !important; }

        .modal-content {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            width: 90%;
        }

        .search-row { display: flex; gap: 5px; margin-bottom: 10px; }

        #search-input {
            flex: 1;
            padding: 8px;
            background: #111;
            color: white;
            border: 1px solid #444;
        }

        #search-results {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .result-card img { width: 100%; border-radius: 4%; }
    </style>
</head>
<body>

    <h1>MTG Grid Builder</h1>

    <div id="controls">
        <button id="btn-download">Download</button>
        <button id="btn-clear" style="background: var(--danger-color)">Reset</button>
    </div>

    <div id="grid-wrapper">
        <div id="grid-container"></div>
    </div>

    <div id="search-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Card name...">
                <button id="btn-search">Search</button>
            </div>
            <div id="search-results"></div>
            <button onclick="closeSearch()" style="margin-top:10px; width:100%; background:#444; border:none; color:white; padding:10px;">Cancel</button>
        </div>
    </div>

    <script>
        const colors = ['White', 'Blue', 'Black', 'Red', 'Green', 'Multi', 'Colorless'];
        const types = ['Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land', 'Kindred', 'Battle'];
        
        let selections = JSON.parse(localStorage.getItem('mtg_fav_grid')) || {};
        let currentTarget = null;

        function render() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';

            // Header Corner
            grid.appendChild(document.createElement('div'));

            // Color Headers
            colors.forEach(c => {
                const div = document.createElement('div');
                div.className = 'grid-header';
                // Using short versions for mobile display if needed
                div.textContent = c.substring(0, 5); 
                grid.appendChild(div);
            });

            // Rows
            types.forEach(t => {
                const rh = document.createElement('div');
                rh.className = 'row-header';
                rh.innerHTML = `<span>${t}</span>`;
                grid.appendChild(rh);

                colors.forEach(c => {
                    const key = `${c}-${t}`;
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.onclick = () => openSearch(key);
                    
                    if (selections[key]) {
                        const img = document.createElement('img');
                        img.crossOrigin = "anonymous";
                        img.src = selections[key];
                        cell.appendChild(img);
                    } else {
                        cell.innerHTML = '<span>+</span>';
                    }
                    grid.appendChild(cell);
                });
            });
        }

        function openSearch(key) {
            currentTarget = key;
            document.getElementById('search-modal').classList.remove('hidden');
            document.getElementById('search-input').focus();
        }

        function closeSearch() {
            document.getElementById('search-modal').classList.add('hidden');
            document.getElementById('search-results').innerHTML = '';
        }

        document.getElementById('btn-search').onclick = performSearch;
        document.getElementById('search-input').onkeydown = (e) => { if(e.key==='Enter') performSearch(); };

        async function performSearch() {
            const q = document.getElementById('search-input').value;
            if(!q) return;
            const resContainer = document.getElementById('search-results');
            resContainer.innerHTML = '...';
            try {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                resContainer.innerHTML = '';
                data.data?.forEach(card => {
                    const url = card.image_uris?.normal || card.card_faces?.[0].image_uris?.normal;
                    if(url) {
                        const img = document.createElement('img');
                        img.src = url;
                        img.onclick = () => {
                            const corsUrl = url.includes('?') ? `${url}&cc=1` : `${url}?cc=1`;
                            selections[currentTarget] = corsUrl;
                            localStorage.setItem('mtg_fav_grid', JSON.stringify(selections));
                            render();
                            closeSearch();
                        };
                        resContainer.appendChild(img);
                    }
                });
            } catch(e) { resContainer.innerHTML = 'Err'; }
        }

        document.getElementById('btn-download').onclick = () => {
            const el = document.getElementById('grid-wrapper');
            html2canvas(el, { useCORS: true, scale: 3, backgroundColor: "#121212" }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'mtg-favs.png';
                link.href = canvas.toURL();
                link.click();
            });
        };

        document.getElementById('btn-clear').onclick = () => {
            if(confirm("Reset?")) { selections = {}; localStorage.clear(); render(); }
        };

        render();
    </script>
</body>
</html>
