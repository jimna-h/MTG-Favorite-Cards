<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Favorite Card Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --cell-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #4CAF50;
            --danger-color: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #grid-wrapper {
            background-color: var(--bg-color);
            padding: 20px;
            display: inline-block;
        }

        #grid-container {
            display: grid;
            gap: 8px;
            align-items: center;
        }

        .grid-header {
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-header {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-header span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            white-space: nowrap;
            font-size: 14px;
            line-height: 1;
            transform: rotate(180deg);
            display: inline-block;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border: 1px dashed var(--border-color);
            aspect-ratio: 63 / 88;
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4.75%;
            overflow: hidden;
            position: relative;
        }

        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .grid-cell .plus {
            color: #333;
            font-size: 28px;
            line-height: 1;
            user-select: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden { display: none !important; }

        .modal-content {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #search-input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            background: #111;
            color: white;
            border: 1px solid #444;
        }

        #search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .result-card img {
            width: 100%;
            border-radius: 4.75%;
            cursor: pointer;
            display: block;
        }
    </style>
</head>
<body>
    <h1>MTG Grid Builder</h1>

    <div id="controls">
        <button id="btn-download">Download Image</button>
        <button id="btn-clear" style="background: var(--danger-color)">Reset</button>
    </div>

    <div id="grid-wrapper">
        <div id="grid-container"></div>
    </div>

    <div id="search-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Card name..." />
                <button id="btn-search">Search</button>
            </div>
            <div id="search-results"></div>
            <button onclick="closeSearch()" style="margin-top:10px; width:100%; background:#444">Close</button>
        </div>
    </div>

    <script>
        const colors = ['White', 'Blue', 'Black', 'Red', 'Green'];
        const types = ['Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'];
        let selections = JSON.parse(localStorage.getItem('mtg_fav_grid')) || {};
        let currentTarget = null;

        function getCardImageUrl(card) {
            return card.image_uris?.png ||
                   card.image_uris?.large ||
                   card.image_uris?.normal ||
                   card.card_faces?.[0]?.image_uris?.png ||
                   card.card_faces?.[0]?.image_uris?.large ||
                   card.card_faces?.[0]?.image_uris?.normal ||
                   null;
        }

        function waitForImages(container) {
            const imgs = [...container.querySelectorAll('img')];
            return Promise.all(imgs.map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve;
                });
            }));
        }

        function render() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `40px repeat(${colors.length}, 100px)`;

            grid.appendChild(document.createElement('div'));

            colors.forEach(c => {
                const div = document.createElement('div');
                div.className = 'grid-header';
                div.textContent = c;
                grid.appendChild(div);
            });

            types.forEach(t => {
                const rh = document.createElement('div');
                rh.className = 'row-header';
                rh.innerHTML = `<span>${t}</span>`;
                grid.appendChild(rh);

                colors.forEach(c => {
                    const key = `${c}-${t}`;
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.onclick = () => openSearch(key);

                    if (selections[key]) {
                        const img = document.createElement('img');
                        img.crossOrigin = 'anonymous';
                        img.referrerPolicy = 'no-referrer';
                        img.src = selections[key];
                        cell.appendChild(img);
                    } else {
                        cell.innerHTML = '<span class="plus">+</span>';
                    }

                    grid.appendChild(cell);
                });
            });
        }

        function openSearch(key) {
            currentTarget = key;
            document.getElementById('search-modal').classList.remove('hidden');
        }

        function closeSearch() {
            document.getElementById('search-modal').classList.add('hidden');
        }

        document.getElementById('btn-search').onclick = async () => {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;

            const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(q)}`, {
                cache: 'no-store'
            });
            const data = await res.json();
            const results = document.getElementById('search-results');
            results.innerHTML = '';

            (data.data || []).forEach(card => {
                const url = getCardImageUrl(card);
                if (url) {
                    const img = document.createElement('img');
                    img.src = url;
                    img.onload = () => {
                        const div = document.createElement('div');
                        div.className = 'result-card';
                        div.appendChild(img);
                        img.onclick = () => {
                            selections[currentTarget] = url;
                            localStorage.setItem('mtg_fav_grid', JSON.stringify(selections));
                            render();
                            closeSearch();
                        };
                        results.appendChild(div);
                    };
                    img.onerror = () => {};
                }
            });
        };

        document.getElementById('btn-download').onclick = async () => {
            const el = document.getElementById('grid-wrapper');
            await document.fonts.ready;
            await waitForImages(el);

            const canvas = await html2canvas(el, {
                useCORS: true,
                allowTaint: false,
                scale: 2,
                backgroundColor: '#121212',
                scrollX: 0,
                scrollY: 0
            });

            const link = document.createElement('a');
            link.download = 'mtg-grid.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        document.getElementById('btn-clear').onclick = () => {
            if (confirm('Clear all?')) {
                selections = {};
                localStorage.removeItem('mtg_fav_grid');
                render();
            }
        };

        render();
    </script>
</body>
</html>
