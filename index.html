<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Favorite Card Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --cell-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #4CAF50;
            --danger-color: #d32f2f;
            --modal-bg: #222;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #controls { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        #grid-wrapper {
            background-color: var(--bg-color);
            padding: 10px;
            width: 98vw;
            max-width: 900px;
            box-sizing: border-box;
        }

        #grid-container { display: grid; gap: 3px; }

        .grid-header {
            font-weight: bold;
            text-align: center;
            font-size: 9px;
            text-transform: uppercase;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-header { display: flex; align-items: center; justify-content: center; width: 30px; }
        .row-header span {
            display: block;
            transform: rotate(-90deg);
            white-space: nowrap;
            font-size: 7px;
            font-weight: bold;
            text-transform: uppercase;
            color: #aaa;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border: 1px dashed var(--border-color);
            aspect-ratio: 63 / 88;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4%;
            overflow: hidden;
            cursor: pointer;
        }

        .grid-cell img { width: 100%; height: 100%; object-fit: cover; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden { display: none !important; }

        .modal-content {
            background: var(--modal-bg);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .settings-section { margin-bottom: 20px; }
        .settings-section h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-color); border-bottom: 1px solid #444; }
        
        .toggle-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }

        .search-row { display: flex; gap: 8px; margin-bottom: 15px; }
        #search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }

        .result-card { display: flex; flex-direction: column; gap: 5px; }
        .result-card img { width: 100%; border-radius: 4.75%; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        .btn-arts { 
            background: #444; 
            font-size: 10px; 
            padding: 4px; 
            border-radius: 3px; 
            width: 100%;
            text-align: center;
        }

        #search-input { flex: 1; padding: 12px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        #search-breadcrumb { font-size: 12px; color: var(--accent-color); margin-bottom: 10px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <h1 style="font-size: 1.4rem; margin: 15px 0;">MTG Grid Builder</h1>

    <div id="controls">
        <button onclick="openSettings()" style="background: #444;">Settings</button>
        <button id="btn-download">Download</button>
        <button id="btn-clear" style="background: var(--danger-color)">Reset</button>
    </div>

    <div id="grid-wrapper">
        <div id="grid-container"></div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Grid Settings</h2>
            <div class="settings-section">
                <h3>Colors</h3>
                <div id="color-toggles" class="toggle-group"></div>
            </div>
            <div class="settings-section">
                <h3>Card Types</h3>
                <div id="type-toggles" class="toggle-group"></div>
            </div>
            <button onclick="closeSettings()" style="width:100%; padding:12px;">Save & Close</button>
        </div>
    </div>

    <div id="search-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="search-breadcrumb" onclick="resetSearchUI()">← Back to Search</div>
            <div class="search-row" id="search-input-container">
                <input type="text" id="search-input" placeholder="Search card name...">
                <button id="btn-modal-search">Search</button>
            </div>
            <div id="search-results"></div>
            <button onclick="closeSearch()" style="margin-top:15px; width:100%; background:#444; color:white; border:none; padding:10px; border-radius:4px;">Cancel</button>
        </div>
    </div>

    <script>
        const allColors = ['White', 'Blue', 'Black', 'Red', 'Green', 'Multi', 'Colorless'];
        const allTypes = ['Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land', 'Kindred', 'Battle'];
        const colorLabels = { 'White': 'White', 'Blue': 'Blue', 'Black': 'Black', 'Red': 'Red', 'Green': 'Green', 'Multi': 'Multi', 'Colorless': 'C-less' };

        let activeColors = JSON.parse(localStorage.getItem('grid_colors')) || ['White', 'Blue', 'Black', 'Red', 'Green'];
        let activeTypes = JSON.parse(localStorage.getItem('grid_types')) || ['Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'];
        let selections = JSON.parse(localStorage.getItem('mtg_fav_grid')) || {};
        let currentTarget = null;

        function initSettings() {
            const colorDiv = document.getElementById('color-toggles');
            const typeDiv = document.getElementById('type-toggles');
            colorDiv.innerHTML = ''; typeDiv.innerHTML = '';
            allColors.forEach(c => {
                const label = document.createElement('label');
                label.className = 'toggle-label';
                label.innerHTML = `<input type="checkbox" value="${c}" ${activeColors.includes(c) ? 'checked' : ''}> ${c}`;
                label.querySelector('input').onchange = updateFilters;
                colorDiv.appendChild(label);
            });
            allTypes.forEach(t => {
                const label = document.createElement('label');
                label.className = 'toggle-label';
                label.innerHTML = `<input type="checkbox" value="${t}" ${activeTypes.includes(t) ? 'checked' : ''}> ${t}`;
                label.querySelector('input').onchange = updateFilters;
                typeDiv.appendChild(label);
            });
        }

        function updateFilters() {
            activeColors = Array.from(document.querySelectorAll('#color-toggles input:checked')).map(i => i.value);
            activeTypes = Array.from(document.querySelectorAll('#type-toggles input:checked')).map(i => i.value);
            localStorage.setItem('grid_colors', JSON.stringify(activeColors));
            localStorage.setItem('grid_types', JSON.stringify(activeTypes));
            render();
        }

        function render() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `30px repeat(${activeColors.length}, 1fr)`;
            if (activeColors.length === 0) { grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:20px;">Open Settings.</div>'; return; }
            grid.appendChild(document.createElement('div')); 
            activeColors.forEach(c => {
                const div = document.createElement('div');
                div.className = 'grid-header';
                div.textContent = colorLabels[c] || c.substring(0, 5);
                grid.appendChild(div);
            });
            activeTypes.forEach(t => {
                const rh = document.createElement('div');
                rh.className = 'row-header';
                rh.innerHTML = `<span>${t}</span>`;
                grid.appendChild(rh);
                activeColors.forEach(c => {
                    const key = `${c}-${t}`;
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.onclick = () => openSearch(key);
                    if (selections[key]) {
                        const img = document.createElement('img');
                        img.crossOrigin = "anonymous";
                        img.src = selections[key];
                        cell.appendChild(img);
                    } else { cell.innerHTML = '<span style="color:#333">+</span>'; }
                    grid.appendChild(cell);
                });
            });
        }

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function openSearch(key) { currentTarget = key; document.getElementById('search-modal').classList.remove('hidden'); document.getElementById('search-input').focus(); }
        function closeSearch() { document.getElementById('search-modal').classList.add('hidden'); resetSearchUI(); }

        function resetSearchUI() {
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('search-input').value = '';
            document.getElementById('search-breadcrumb').style.display = 'none';
            document.getElementById('search-input-container').style.display = 'flex';
        }

        document.getElementById('btn-modal-search').onclick = performSearch;
        document.getElementById('search-input').onkeydown = (e) => { if (e.key === 'Enter') performSearch(); };

        async function performSearch() {
            const q = document.getElementById('search-input').value;
            if (q.length < 2) return;
            const resContainer = document.getElementById('search-results');
            resContainer.innerHTML = 'Searching...';
            try {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                resContainer.innerHTML = '';
                if (!data.data) { resContainer.innerHTML = 'No cards found.'; return; }
                
                data.data.slice(0, 20).forEach(card => {
                    const url = card.image_uris?.normal || card.card_faces?.[0].image_uris?.normal;
                    if (url) {
                        const div = document.createElement('div');
                        div.className = 'result-card';
                        
                        const img = document.createElement('img');
                        img.src = url;
                        img.onclick = () => selectImage(url);
                        
                        const btnArts = document.createElement('button');
                        btnArts.className = 'btn-arts';
                        btnArts.textContent = 'Other Arts';
                        btnArts.onclick = (e) => { e.stopPropagation(); showAllArts(card.name); };
                        
                        div.appendChild(img);
                        div.appendChild(btnArts);
                        resContainer.appendChild(div);
                    }
                });
            } catch (e) { resContainer.innerHTML = 'Error searching.'; }
        }

        async function showAllArts(cardName) {
            const resContainer = document.getElementById('search-results');
            document.getElementById('search-breadcrumb').style.display = 'block';
            document.getElementById('search-input-container').style.display = 'none';
            resContainer.innerHTML = 'Loading arts...';
            try {
                const res = await fetch(`https://api.scryfall.com/cards/search?unique=art&q=!"${encodeURIComponent(cardName)}"`);
                const data = await res.json();
                resContainer.innerHTML = '';
                data.data.forEach(card => {
                    const url = card.image_uris?.normal || card.card_faces?.[0].image_uris?.normal;
                    if (url) {
                        const img = document.createElement('img');
                        img.src = url;
                        img.onclick = () => selectImage(url);
                        const div = document.createElement('div');
                        div.className = 'result-card';
                        div.appendChild(img);
                        resContainer.appendChild(div);
                    }
                });
            } catch (e) { resContainer.innerHTML = 'Error loading arts.'; }
        }

        function selectImage(url) {
            const corsUrl = url.includes('?') ? `${url}&cc=1` : `${url}?cc=1`;
            selections[currentTarget] = corsUrl;
            localStorage.setItem('mtg_fav_grid', JSON.stringify(selections));
            render();
            closeSearch();
        }

        document.getElementById('btn-download').onclick = () => {
            const el = document.getElementById('grid-wrapper');
            html2canvas(el, { useCORS: true, scale: 3, backgroundColor: "#121212" }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'mtg-fav-grid.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        };

        document.getElementById('btn-clear').onclick = () => {
            if(confirm("Wipe all cards?")) { selections = {}; localStorage.removeItem('mtg_fav_grid'); render(); }
        };

        initSettings();
        render();
    </script>
</body>
</html>
