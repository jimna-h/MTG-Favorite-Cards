<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Favorite Card Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --cell-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #4CAF50;
            --danger-color: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Controls Section */
        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #1a1a1a;
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        /* Grid Layout */
        #grid-wrapper {
            width: 100%;
            max-width: 1200px;
            background-color: var(--bg-color);
            padding: 20px;
            box-sizing: border-box;
        }

        #grid-container {
            display: grid;
            gap: 8px;
            width: 100%; 
        }

        .grid-header {
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.7rem, 2.5vw, 1.1rem);
        }

        /* Fixed Vertical Text for Downloads */
        .row-header {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-header span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            white-space: nowrap;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border: 1px dashed var(--border-color);
            aspect-ratio: 63 / 88; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 4.75%; 
        }

        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .hidden { display: none !important; }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #search-bar { display: flex; gap: 10px; }
        #search-input { flex: 1; padding: 10px; border-radius: 4px; background: #111; color: white; border: 1px solid #444; }
        #search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; }
        .result-card img { width: 100%; border-radius: 4.75%; cursor: pointer; }

    </style>
</head>
<body>

    <h1>MTG Favorite Card Grid</h1>

    <div id="controls">
        <div class="button-group">
            <button id="btn-download">Download Image</button>
            <button id="btn-clear" style="background-color: var(--danger-color);">Reset Grid</button>
        </div>
    </div>

    <div id="grid-wrapper">
        <div id="grid-container"></div>
    </div>

    <div id="search-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="search-bar">
                <input type="text" id="search-input" placeholder="Card name...">
                <button id="btn-search">Search</button>
            </div>
            <div id="search-results"></div>
            <button onclick="closeSearchModal()" style="background: #444;">Cancel</button>
        </div>
    </div>

    <script>
        const colors = [{id:'W', n:'White'}, {id:'U', n:'Blue'}, {id:'B', n:'Black'}, {id:'R', n:'Red'}, {id:'G', n:'Green'}];
        const types = ['Creature', 'Sorcery', 'Instant', 'Artifact', 'Enchantment', 'Planeswalker', 'Land'];
        let selections = JSON.parse(localStorage.getItem('mtg_grid')) || {};
        let activeCell = null;

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `40px repeat(${colors.length}, 1fr)`;

            container.appendChild(document.createElement('div'));
            colors.forEach(c => {
                const h = document.createElement('div');
                h.className = 'grid-header';
                h.textContent = c.n;
                container.appendChild(h);
            });

            types.forEach(t => {
                const rh = document.createElement('div');
                rh.className = 'grid-header row-header';
                const span = document.createElement('span');
                span.textContent = t;
                rh.appendChild(span);
                container.appendChild(rh);

                colors.forEach(c => {
                    const key = `${c.id}-${t}`;
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.onclick = () => openSearch(key);
                    if(selections[key]) {
                        const img = document.createElement('img');
                        img.src = selections[key];
                        img.crossOrigin = "anonymous";
                        cell.appendChild(img);
                    } else {
                        cell.innerHTML = '<span style="color:#444">+</span>';
                    }
                    container.appendChild(cell);
                });
            });
        }

        function openSearch(key) {
            activeCell = key;
            document.getElementById('search-modal').classList.remove('hidden');
        }

        function closeSearchModal() {
            document.getElementById('search-modal').classList.add('hidden');
        }

        document.getElementById('btn-search').onclick = async () => {
            const query = document.getElementById('search-input').value;
            const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            const results = document.getElementById('search-results');
            results.innerHTML = '';
            data.data.forEach(card => {
                const imgUrl = card.image_uris?.normal || card.card_faces?.[0].image_uris?.normal;
                if(imgUrl) {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.onclick = () => {
                        selections[activeCell] = imgUrl;
                        localStorage.setItem('mtg_grid', JSON.stringify(selections));
                        renderGrid();
                        closeSearchModal();
                    };
                    const div = document.createElement('div');
                    div.className = 'result-card';
                    div.appendChild(img);
                    results.appendChild(div);
                }
            });
        };

        document.getElementById('btn-download').onclick = () => {
            const wrapper = document.getElementById('grid-wrapper');
            html2canvas(wrapper, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'mtg-favorites.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };

        document.getElementById('btn-clear').onclick = () => {
            if(confirm("Reset grid?")) { selections = {}; localStorage.clear(); renderGrid(); }
        };

        renderGrid();
    </script>
</body>
</html>
